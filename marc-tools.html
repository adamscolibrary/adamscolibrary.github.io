<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARC Tools</title>
<script src="https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/umd/index.min.js"></script>
<style>
.side{position:fixed;width:200px;height:100%;overflow:auto;background:#f1f1f1;padding:8px}
.main{margin-left:220px;padding:8px}
.tab{display:none}.tab.on{display:block}
.tab-btn{padding:3px 6px;cursor:pointer}
.tab-btn.on{font-weight:bold;border-bottom:2px solid #333}
.res div{padding:4px;cursor:pointer;border-bottom:1px solid #eee}
.res div:hover{background:#f0f7ff}
.mds-num{font-weight:bold;margin-right:8px;color:#0366d6}
.info{color:#666;font-size:.9em;padding:4px 0}
.disabled{opacity:.5;pointer-events:none}
.thumb{max-height:120px}
</style>
</head>
<body>
<div class="side">
<h1>MARC Tools</h1>
<b>Item Search</b>
<p><input id="univSearch" placeholder="Title, ISBN, keywords...">
<div id="providers">
<p><button data-p="abebooks">AbeBooks</button> a!
<p><button data-p="discogs">Discogs</button> d!
<p><button data-p="googlebooks">Google Books</button> g!
<p><button data-p="hardcover">Hardcover</button> h!
<p><button data-p="librarything">LibraryThing</button> l!
<p><button data-p="tmdb">TMDB</button> t!
</div>
<hr>OCLC
<p><a href="https://www.oclc.org/bibformats/en/0xx.html" target="_blank">Bib Formats</a>
<p><a href="https://entities.oclc.org/worldcat/ddc/" target="_blank">DDC Linked Data</a>
<p><a href="https://fast.oclc.org/searchfast/" target="_blank">FAST Search</a>
<hr>Library of Congress
<p><a href="https://authorities.loc.gov/" target="_blank">LOC Authorities</a>
<p><a href="https://www.loc.gov/aba/publications/FreeLCGFT/freelcgft.html" target="_blank">LCGFT Terms</a>
<hr>LibraryThing
<p><a href="https://www.librarything.com/mds" target="_blank">MDS</a>
<p><a href="https://www.talpasearch.com/429.669/search?su_catalog_url=https%3A%2F%2Fohio.ent.sirsi.net%2Fclient%2Fen_US%2Facp%2F" target="_blank">Talpa AI</a>
<hr>SEO
<p><a href="https://support.servingeveryohioan.org/support/solutions" target="_blank">SEO Knowledge Base</a>
</div>

<div class="main">
<div id="tabBar">
<button class="tab-btn on" data-tab="lcsh">LCSH</button>
<button class="tab-btn" data-tab="mds">MDS</button>
<button class="tab-btn" data-tab="ol">Open Library</button>
</div>

<div id="tab-lcsh" class="tab on">
<h3>LCSH MARC Builder</h3>
<div id="builderActions">
<button data-action="copy" title="Ctrl+C">Copy ^C</button>
<button data-action="copyJuv" title="Ctrl+J">Copy Juv ^J</button>
<button data-action="clear" title="Ctrl+X">Clear ^X</button>
</div>
<p><input id="f1" placeholder="Main term">
<p id="seps0"></p>
<p><span id="sep0">+</span><input id="f2">
<p id="seps1"></p>
<p><span id="sep1">+</span><input id="f3">
<hr>
<h4>LCSH Search</h4>
<p><input id="lcshInput" placeholder="Search subjects..."> <span id="lcshStatus" class="info"></span>
<div id="lcshResults" class="res"></div>
</div>

<div id="tab-mds" class="tab">
<h3>Melvil Decimal System</h3>
<b>Search</b>
<p><input id="mdsInput" placeholder="Search subjects..."> <span id="mdsStatus" class="info"></span>
<div id="mdsResults" class="res"></div>
<hr>
<b>Browse</b>
<p id="mdsCrumbs" class="info"></p>
<div id="mdsBrowse" class="res"></div>
</div>

<div id="tab-ol" class="tab">
<h3>Open Library Lookup</h3>
<p><input id="olInput" placeholder="Enter ISBN..." size="20"> <button id="olBtn">Search</button> <button id="olClear">Clear</button>
<div id="olResults"></div>
</div>
</div>

<script>
const app = (() => {
    const LCSH_URL = 'https://raw.githubusercontent.com/adamscolibrary/LCSH-2026/refs/heads/main/LCSH26.json';
    const MDS_URL  = 'https://raw.githubusercontent.com/adamscolibrary/Melvil-Decimal-System-1922/refs/heads/main/mds.json';
    const SUF = ['s','es','ed','ing','er','ers','ly','tion','sion','ment','ness','ity','al','ial'];
    const TOKENIZE = t => t.toLowerCase().split(/[\s\|\(\)\,\.\;\:\/\-]+/).filter(x=>x.length>1);
    const isISBN = q => /^[\d\-X]{9,17}$/.test(q.replace(/\s/g,''));
    const $ = id => document.getElementById(id);
    const esc = s => s.replace(/"/g,'&quot;');
    const row = (l,v) => v ? `<p><b>${l}:</b> ${v}` : '';
    const copy = t => navigator.clipboard.writeText(t);

    const shortcuts = {a:'abebooks',d:'discogs',g:'googlebooks',h:'hardcover',l:'librarything',t:'tmdb'};
    const providers = {
        abebooks:    q => `https://www.abebooks.com/servlet/SearchResults?kn=${q}`,
        discogs:     q => `https://www.discogs.com/search?q=${q}`,
        googlebooks: q => `https://www.google.com/search?tbm=bks&q=${isISBN(decodeURIComponent(q))?'isbn:':''}${q}`,
        hardcover:   q => `https://hardcover.app/search?q=${q}`,
        librarything:q => `https://www.librarything.com/search.php?search=${q}`,
        tmdb:        q => `https://www.themoviedb.org/search?query=${q}`
    };

    let lcshIndex, lcshData, mdsIndex, mdsData, lcshTimer, mdsTimer;

    // Shared match + score
    const matchScore = (text, q) => {
        let s = 0;
        if (text.includes(q)) s += 50;
        for (const w of text.split(/[\s\|\(\)\,\.\;\:\/\-]+/)) {
            if (w.startsWith(q)) s += 75;
            else if (SUF.some(x=>w===q+x)) s += 40;
            else if (q.endsWith('e')&&['ing','ed','er'].some(x=>w===q.slice(0,-1)+x)) s += 40;
        }
        if (text.startsWith(q)) s += 25;
        for (const w of text.split(/[\s\-\(\)\|\,\.\;\:\/]+/))
            s += w===q ? 100 : 0;
        return s;
    };

    // Shared index loader
    const loadIndex = (url, field, statusEl, onDone) => {
        $(statusEl).textContent = 'Loading...';
        fetch(url).then(r=>r.ok?r.json():Promise.reject()).then(data=>{
            const idx = new MiniSearch({
                fields:[field], storeFields:['num','desc','marc'],
                tokenize: TOKENIZE
            });
            onDone(data, idx, statusEl);
        }).catch(()=>$(statusEl).textContent='Error loading');
    };

    // Shared search supplement
    const supplement = (results, data, q, keyFn, textFn, scoreFn) => {
        if (results.length >= 20 || !data) return results;
        const ql = q.toLowerCase(), seen = new Set(results.map(keyFn));
        data.filter(d => !seen.has(keyFn(d)) && matchScore(textFn(d).toLowerCase(), ql) > 0)
            .slice(0, 30)
            .forEach(d => results.push({...d, score: scoreFn(d, ql)}));
        return results;
    };

    // Builder
    const getStr = () => {
        const f = [$('f1').value,$('f2').value,$('f3').value];
        const s = [$('sep0').textContent,$('sep1').textContent].map(x=>x.includes('|')?x:'');
        return `${f[0]}${s[0]}${f[1]}${s[1]}${f[2]}`.trim();
    };
    const populate = marc => {
        const p = marc.replace(/\.$/,'').split('|');
        $('f1').value=p[0]||''; $('f2').value=p[1]?.slice(1)||''; $('f3').value=p[2]?.slice(1)||'';
        $('sep0').textContent=p[1]?'|'+p[1][0]:'+';
        $('sep1').textContent=p[2]?'|'+p[2][0]:'+';
    };
    const clearB = () => {
        $('f1').value=$('f2').value=$('f3').value='';
        $('sep0').textContent=$('sep1').textContent='+';
    };

    // Separator buttons - generated once
    const sepBtns = ['+','|v','|x','|y','|z'].map(v=>
        `<button data-sep="${v==='+' ? 'none' : v}" data-val="${v}">${v==='+'?'None':v}</button>`
    ).join('');
    
    // LCSH
    const searchLCSH = () => {
        clearTimeout(lcshTimer);
        const q = $('lcshInput').value.trim();
        if (q.length<2) return $('lcshResults').innerHTML='';
        lcshTimer = setTimeout(()=>{
            let r = lcshIndex
                ? lcshIndex.search(q,{prefix:true,fuzzy:.2,combineWith:'OR'}).map(x=>({marc:x.marc,score:x.score}))
                : [];
            r = supplement(r, lcshData, q, x=>x.marc, x=>x.marc, (d,ql)=>matchScore(d.marc.toLowerCase(),ql));
            r.sort((a,b)=>b.score-a.score);
            r = r.slice(0,75);
            if (r.length) {
                $('lcshResults').innerHTML = r.map(x=>`<div data-marc="${esc(x.marc)}">${x.marc}</div>`).join('');
            } else {
                $('lcshResults').innerHTML = '<div class="info">Searching LOC...</div>';
                fetch(`https://id.loc.gov/authorities/subjects/suggest2?q=${encodeURIComponent(q)}`)
                    .then(r=>r.json()).then(data=>{
                        const hits=(data.hits||[]).flatMap(h=>(h.more?.marcKeys||[])
                            .map(k=>k.replace(/^.*?\$a/,'').replace(/\$/g,'|')+'.'));
                        $('lcshResults').innerHTML = hits.length
                            ? hits.map(m=>`<div data-marc="${esc(m)}">${m}</div>`).join('')
                            : '<div class="info">No results</div>';
                    }).catch(()=>$('lcshResults').innerHTML='<div class="info">Error</div>');
            }
        },150);
    };

    // MDS
    const searchMDS = () => {
        clearTimeout(mdsTimer);
        const q = $('mdsInput').value.trim();
        if (q.length<2) return $('mdsResults').innerHTML='';
        mdsTimer = setTimeout(()=>{
            let r = mdsIndex.search(q,{prefix:true,fuzzy:.2,combineWith:'OR'})
                .map(x=>({num:x.num,desc:x.desc,score:x.score}));
            r = supplement(r, mdsData, q, x=>x.num, x=>x.desc,
                (d,ql)=>matchScore(d.desc.toLowerCase(),ql)+(5-d.num.length)*2);
            r.sort((a,b)=>b.score-a.score);
            $('mdsResults').innerHTML = r.slice(0,50).map(x=>
                `<div data-mds="${x.num}"><span class="mds-num">${x.num}</span>${x.desc}</div>`
            ).join('') || '<div class="info">No results</div>';
        },150);
    };

    const mdsChildLen = p => p.length<3 ? p.length+1 : p.includes('.')?p.length+1:p.length+2;

    const mdsBrowse = prefix => {
        const nextLen = mdsChildLen(prefix);
        const children = mdsData.filter(d=>d.num.startsWith(prefix)&&d.num.length===nextLen);

        $('mdsCrumbs').innerHTML = !prefix ? '<b>All Classes</b>' : [
            `<a href="#" data-browse="">All Classes</a>`,
            ...Array.from({length:prefix.length},(_,i)=>{
                const sl=prefix.slice(0,i+1), en=mdsData.find(d=>d.num===sl);
                const lb=en?`${sl} ${en.desc}`:sl;
                return i+1<prefix.length?`<a href="#" data-browse="${sl}">${lb}</a>`:`<b>${lb}</b>`;
            })
        ].join(' › ');

        if (!children.length) {
            const en = mdsData.find(d=>d.num===prefix);
            $('mdsBrowse').innerHTML = en
                ? `<div data-mds="${en.num}"><span class="mds-num">${en.num}</span>${en.desc} <span class="info">— click to copy</span></div>`
                : '<div class="info">No further subdivisions</div>';
            return;
        }

        $('mdsBrowse').innerHTML = children.map(d=>{
            const hasKids = mdsData.some(x=>x.num.startsWith(d.num)&&x.num.length===mdsChildLen(d.num));
            return `<div data-browse="${d.num}"><span class="mds-num">${d.num}</span>${d.desc}${hasKids?' ›':`<a href="#" data-mds="${d.num}" onclick="event.stopPropagation()"> copy</a>`}</div>`;
        }).join('');
    };

    // Open Library
    const searchOL = () => {
        const q = $('olInput').value.trim();
        if (!q) return $('olResults').innerHTML='<div class="info">Please enter an ISBN</div>';
        $('olResults').innerHTML = '<div class="info">Searching...</div>';
        fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${q.replace(/[^0-9Xx]/g,'')}&jscmd=data&format=json`)
            .then(r=>r.json()).then(data=>{
                const book = data[Object.keys(data)[0]];
                if (!book) return $('olResults').innerHTML='<p>Not found. <a href="https://openlibrary.org/books/add" target="_blank">Add?</a>';
                const nm = arr => arr?.map(x=>x.name).join(', ')||'';
                const wid = book.key?.split('/').pop();
                const eurl = wid?`https://openlibrary.org/books/${wid}/${encodeURIComponent((book.title||'').replace(/\s+/g,'_'))}/edit?work_key=/works/${wid}`:'';
                $('olResults').innerHTML = [
                    row('Title',book.title), row('Subtitle',book.subtitle),
                    row('Authors',nm(book.authors)), row('Published',book.publish_date),
                    row('Publishers',nm(book.publishers)), row('Pages',book.number_of_pages),
                    row('MDS',book.classifications?.dewey_decimal_class?.join(', ')),
                    row('LC',book.classifications?.lc_classifications?.join(', ')),
                    row('Subjects',nm(book.subjects)),
                    book.cover?.medium?`<p><img src="${book.cover.medium}" class="thumb">`:'',
                    book.url?`<p><a href="${book.url}" target="_blank">View on Open Library</a>`:'',
                    eurl?`<p><a href="${eurl}" target="_blank">Edit on Open Library</a>`:''
                ].join('');
            }).catch(e=>$('olResults').innerHTML=`<p>Error: ${e.message}`);
    };

    const init = () => {
        // Inject separator buttons
        $('seps0').innerHTML = $('seps1').innerHTML = sepBtns;

        // Tabs
        $('tabBar').onclick = e => {
            const b=e.target.closest('[data-tab]');
            if (!b) return;
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('on',x.dataset.tab===b.dataset.tab));
            document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.id==='tab-'+b.dataset.tab));
        };

        // Universal search
        $('univSearch').oninput = () => $('providers').classList.toggle('disabled',!$('univSearch').value.trim());
        $('univSearch').addEventListener('keydown', e => {
            if (e.key!=='Enter') return;
            const raw=$('univSearch').value.trim(), p=shortcuts[raw[0]];
            if (p&&raw[1]==='!') { const q=encodeURIComponent(raw.substring(2).trim()); if(q) window.open(providers[p](q),'_blank'); }
        });
        $('providers').onclick = e => { const p=e.target.dataset.p,q=$('univSearch').value.trim(); if(p&&q) window.open(providers[p](encodeURIComponent(q)),'_blank'); };

        // Builder
        $('builderActions').onclick = e => {
            const a=e.target.dataset.action;
            if(a==='copy') copy(getStr()+'.');
            if(a==='copyJuv') copy(getStr()+'|vJuvenile literature.');
            if(a==='clear') clearB();
        };
        document.onclick = e => {
            const b=e.target.closest('[data-sep]');
            if (b) { const idx=b.closest('#seps0')?0:1; $('sep'+idx).textContent=b.dataset.val; }
        };

        // LCSH
        $('lcshInput').oninput = searchLCSH;
        $('lcshResults').onclick = e => { const d=e.target.closest('[data-marc]'); if(d) populate(d.dataset.marc); };

        // MDS
        $('mdsInput').oninput = searchMDS;
        const mdsClick = e => {
            const br=e.target.closest('[data-browse]');
            if (br) { mdsBrowse(br.dataset.browse); return; }
            const it=e.target.closest('[data-mds]');
            if (it) { copy(it.dataset.mds); it.style.background='#d4edda'; setTimeout(()=>it.style.background='',200); }
        };
        $('mdsResults').onclick = $('mdsBrowse').onclick = mdsClick;
        $('mdsCrumbs').onclick = e => { const a=e.target.closest('[data-browse]'); if(a){e.preventDefault();mdsBrowse(a.dataset.browse);}};

        // Open Library
        $('olInput').addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();searchOL();}});
        $('olBtn').addEventListener('click', searchOL);
        $('olClear').addEventListener('click', ()=>{ $('olInput').value=''; $('olResults').innerHTML=''; $('olInput').focus(); });

        // Keyboard shortcuts
        document.onkeydown = e => {
            if (!(e.ctrlKey||e.metaKey)) return;
            const inp=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
            if (e.key==='c'&&!inp){e.preventDefault();copy(getStr()+'.');}
            if (e.key==='j'){e.preventDefault();copy(getStr()+'|vJuvenile literature.');}
            if (e.key==='x'&&!inp){e.preventDefault();clearB();}
        };

        // Load data
        loadIndex(LCSH_URL, 'marc', 'lcshStatus', (data, idx, statusEl) => {
            lcshData = data;
            idx.addAll(data.map((d,i)=>({id:i,marc:d.marc})));
            lcshIndex = idx;
            $(statusEl).textContent = `✓ ${data.length.toLocaleString()}`;
        });

        loadIndex(MDS_URL, 'desc', 'mdsStatus', (data, idx, statusEl) => {
            mdsData = Object.entries(data).map(([num,desc])=>({num,desc}));
            idx.addAll(mdsData.map((d,i)=>({id:i,...d})));
            mdsIndex = idx;
            $(statusEl).textContent = `✓ ${mdsData.length.toLocaleString()}`;
            mdsBrowse('');
        });
    };

    return { init };
})();

document.addEventListener('DOMContentLoaded', app.init);
</script>
</body>
</html>
